name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build ZIPs
        run: python build.py

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Read changelog entry
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Extrae el bloque del changelog para esta versión
          NOTES=$(awk "/^v${VERSION}/,/^v[0-9]/" plugin.video.turecomendador/changelog.txt \
            | grep -v "^v[0-9]" | sed '/^$/d')
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.changelog.outputs.NOTES }}
          files: |
            dist/plugin.video.turecomendador/plugin.video.turecomendador-${{ steps.version.outputs.VERSION }}.zip
